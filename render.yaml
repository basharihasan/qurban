# render.yaml — Render Infrastructure as Code
# Docs: https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: qurban-api
    runtime: docker
    plan: free
    dockerContext: backend
    dockerfilePath: backend/Dockerfile

    # Health check
    healthCheckPath: /api/health

    autoDeploy: true
    branch: main

    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: FRONTEND_URL
        sync: false
      - key: WA_ENABLED
        value: "false"
      - key: WA_API_URL
        value: https://api.fonnte.com/send
      - key: WA_API_TOKEN
        sync: false
      - key: UPLOAD_DIR
        value: uploads
      - key: RATE_LIMIT_MAX
        value: "200"
      - key: AUTH_RATE_LIMIT_MAX
        value: "20"
